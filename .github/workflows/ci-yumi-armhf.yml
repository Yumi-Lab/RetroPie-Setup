name: CI — yumi-armhf RetroPie-Setup

on:
  push:
    branches:
      - yumi-armhf
  pull_request:
    branches:
      - yumi-armhf
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (default: openbor)'
        required: false
        default: 'openbor'

concurrency:
  group: ci-yumi-armhf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, Linux, ARM, yumi-fr]
    name: build — ${{ github.event.inputs.package || 'openbor' }} (armhf native)
    timeout-minutes: 120

    steps:
      - name: System info
        run: |
          echo "=== Native ARM build ==="
          uname -m
          cat /etc/os-release | grep PRETTY_NAME
          nproc
          free -h | head -2

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget ca-certificates sudo dialog \
            build-essential cmake pkg-config \
            gpg subversion unzip dirmngr lsb-release \
            python3 python3-pyudev xmlstarlet \
            libsdl2-dev libogg-dev libvorbis-dev libpng-dev zlib1g-dev

      - name: Prepare build environment
        run: |
          # Clean previous build if any
          sudo rm -rf /tmp/retropie-ci
          mkdir -p /tmp/retropie-ci/output

          # Clone yumi-armhf branch
          git clone --depth=1 -b yumi-armhf \
            https://github.com/Yumi-Lab/RetroPie-Setup.git \
            /tmp/retropie-ci/RetroPie-Setup

      - name: Build ${{ github.event.inputs.package || 'openbor' }}
        env:
          PACKAGE: ${{ github.event.inputs.package || 'openbor' }}
        run: |
          cd /tmp/retropie-ci/RetroPie-Setup

          export __platform="armv7-mali"
          export __user="$(whoami)"

          echo "=== Building: ${PACKAGE} (native armhf) ==="
          sudo -E bash retropie_packages.sh "${PACKAGE}" _source_ \
            2>&1 | tee /tmp/retropie-ci/output/build.log

      - name: Validate and package
        env:
          PACKAGE: ${{ github.event.inputs.package || 'openbor' }}
        run: |
          echo "=== Installed files ==="
          find /opt/retropie -type f 2>/dev/null | head -30
          du -sh /opt/retropie 2>/dev/null || true

          if [ ! -d /opt/retropie ]; then
            echo "ERROR: /opt/retropie not found — build failed"
            exit 1
          fi

          tar -czf "/tmp/retropie-ci/output/packages-${PACKAGE}-armhf.tar.gz" \
            -C / opt/retropie/
          echo "Package created:"
          ls -lh /tmp/retropie-ci/output/*.tar.gz

      - name: Cleanup build artifacts
        if: always()
        run: |
          sudo rm -rf /opt/retropie
          sudo rm -rf /tmp/retropie-ci/RetroPie-Setup

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.event.inputs.package || 'openbor' }}
          path: /tmp/retropie-ci/output/build.log

      - name: Upload package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ github.event.inputs.package || 'openbor' }}-armhf
          path: /tmp/retropie-ci/output/packages-*.tar.gz
