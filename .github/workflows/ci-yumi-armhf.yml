name: CI yumi-armhf

on:
  push:
    branches:
      - yumi-armhf
  pull_request:
    branches:
      - yumi-armhf
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test (default: openbor)'
        required: false
        default: 'openbor'

concurrency:
  group: ci-yumi-armhf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        debian: [bookworm, trixie]
    name: Build (${{ matrix.debian }}) — ${{ github.event.inputs.package || 'openbor' }}

    steps:
      - name: Checkout yumi-armhf
        uses: actions/checkout@v4
        with:
          ref: yumi-armhf

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build package in debian:${{ matrix.debian }} armhf container
        run: |
          PACKAGE="${{ github.event.inputs.package || 'openbor' }}"
          DEBIAN="${{ matrix.debian }}"
          mkdir -p /tmp/output

          docker run --rm \
            --platform linux/arm/v7 \
            -v "${{ github.workspace }}:/retropie-setup:ro" \
            -v "/tmp/output:/output" \
            "debian:${DEBIAN}" \
            bash -c '
              set -e

              echo "=== System info ==="
              uname -m
              grep PRETTY_NAME /etc/os-release

              echo "=== Installing build dependencies ==="
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                git curl wget ca-certificates sudo dialog \
                build-essential cmake pkg-config \
                libsdl2-dev libogg-dev libvorbis-dev libpng-dev zlib1g-dev \
                xmlstarlet python3 2>&1 | tail -5

              id -u pi &>/dev/null || useradd -m -s /bin/bash pi
              echo "pi ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

              cp -r /retropie-setup /home/pi/RetroPie-Setup
              chown -R pi:pi /home/pi/RetroPie-Setup

              export __platform="armv7-mali"
              export __user="pi"

              cd /home/pi/RetroPie-Setup
              bash retropie_packages.sh "'"${PACKAGE}"'" 2>&1 | tee "/output/build-'"${DEBIAN}"'.log"

              echo "=== Installed files ==="
              find /opt/retropie -type f | head -20
              du -sh /opt/retropie || true

              tar -czf "/output/packages-'"${PACKAGE}"'-'"${DEBIAN}"'-armhf.tar.gz" -C / opt/retropie/ 2>/dev/null || true
              ls -lh /output/
            '

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.debian }}-${{ github.event.inputs.package || 'openbor' }}
          path: /tmp/output/build-${{ matrix.debian }}.log

      - name: Upload package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ github.event.inputs.package || 'openbor' }}-${{ matrix.debian }}-armhf
          path: /tmp/output/packages-${{ github.event.inputs.package || 'openbor' }}-${{ matrix.debian }}-armhf.tar.gz
