name: CI — yumi-armhf RetroPie-Setup

on:
  push:
    branches:
      - yumi-armhf
  pull_request:
    branches:
      - yumi-armhf
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to install (default: openbor)'
        required: false
        default: 'openbor'

concurrency:
  group: ci-yumi-armhf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retropie-setup:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        debian: [bookworm, trixie]
    name: retropie_setup — debian:${{ matrix.debian }}

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Run retropie_packages.sh on debian:${{ matrix.debian }} (armhf)
        run: |
          DEBIAN="${{ matrix.debian }}"
          PACKAGE="${{ github.event.inputs.package || 'openbor' }}"
          mkdir -p /tmp/output

          docker run --rm \
            --platform linux/arm/v7 \
            -v "/tmp/output:/output" \
            "debian:${DEBIAN}" \
            bash -c '
              set -e

              echo "=== System info ==="
              uname -m
              grep PRETTY_NAME /etc/os-release

              echo "=== Installing bootstrap dependencies ==="
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                git curl ca-certificates sudo dialog \
                build-essential cmake pkg-config \
                libsdl2-dev libogg-dev libvorbis-dev libpng-dev zlib1g-dev \
                xmlstarlet python3 2>&1 | tail -5

              id -u pi &>/dev/null || useradd -m -s /bin/bash pi
              echo "pi ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

              echo "=== Cloning Yumi-Lab/RetroPie-Setup (yumi-armhf) ==="
              git clone --depth=1 -b yumi-armhf \
                https://github.com/Yumi-Lab/RetroPie-Setup.git \
                /home/pi/RetroPie-Setup
              chown -R pi:pi /home/pi/RetroPie-Setup

              export __platform="armv7-mali"
              export __user="pi"

              cd /home/pi/RetroPie-Setup

              echo "=== Installing: '"${PACKAGE}"' ==="
              bash retropie_packages.sh "'"${PACKAGE}"'" 2>&1 | tee /output/install-'"${DEBIAN}"'.log

              echo "=== Validation ==="
              echo "--- Installed files ---"
              find /opt/retropie -type f | head -20
              du -sh /opt/retropie 2>/dev/null || echo "nothing installed"

              echo "=== Done ==="
            ' 2>&1 | tee /tmp/output/run-${DEBIAN}.log || true

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retropie-log-${{ matrix.debian }}-${{ github.event.inputs.package || 'openbor' }}
          path: /tmp/output/install-${{ matrix.debian }}.log
