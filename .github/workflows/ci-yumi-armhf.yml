name: CI — yumi-armhf RetroPie-Setup

on:
  push:
    branches:
      - yumi-armhf
  pull_request:
    branches:
      - yumi-armhf
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to install (default: openbor)'
        required: false
        default: 'openbor'

concurrency:
  group: ci-yumi-armhf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retropie-setup:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        debian: [bookworm, trixie]
    name: retropie_setup — debian:${{ matrix.debian }}

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build ${{ github.event.inputs.package || 'openbor' }} on debian:${{ matrix.debian }} (armhf)
        run: |
          DEBIAN="${{ matrix.debian }}"
          PACKAGE="${{ github.event.inputs.package || 'openbor' }}"
          mkdir -p /tmp/output

          docker run --rm \
            --platform linux/arm/v7 \
            -v "/tmp/output:/output" \
            "debian:${DEBIAN}" \
            bash -c '
              set -e

              echo "=== System info ==="
              uname -m
              cat /etc/os-release | grep PRETTY_NAME

              echo "=== Installing dependencies ==="
              # Pre-install ALL dependencies so retropie_packages.sh does not need
              # to run slow apt operations inside QEMU.
              # — RetroPie core (get_retropie_depends): git gpg subversion dialog
              #   curl gcc g++ build-essential unzip xmlstarlet python3-pyudev
              #   ca-certificates dirmngr
              # — OS detection (get_os_version): lsb-release
              # — openbor (depends_openbor): cmake libsdl2-dev libogg-dev
              #   libvorbis-dev libpng-dev zlib1g-dev
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                git curl wget ca-certificates sudo dialog \
                build-essential cmake pkg-config \
                gpg subversion unzip dirmngr lsb-release \
                python3 python3-pyudev \
                xmlstarlet \
                libsdl2-dev libogg-dev libvorbis-dev libpng-dev zlib1g-dev \
                2>&1 | tail -20

              id -u pi &>/dev/null || useradd -m -s /bin/bash pi
              echo "pi ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

              echo "=== Cloning Yumi-Lab/RetroPie-Setup (yumi-armhf) ==="
              git clone --depth=1 -b yumi-armhf \
                https://github.com/Yumi-Lab/RetroPie-Setup.git \
                /home/pi/RetroPie-Setup
              chown -R pi:pi /home/pi/RetroPie-Setup

              export __platform="armv7-mali"
              export __user="pi"

              cd /home/pi/RetroPie-Setup

              echo "=== Installing: '"${PACKAGE}"' ==="
              bash retropie_packages.sh "'"${PACKAGE}"'" _source_ 2>&1 | tee /output/install-'"${DEBIAN}"'.log

              echo "=== Validation ==="
              echo "--- Installed files ---"
              find /opt/retropie -type f 2>/dev/null | head -30
              du -sh /opt/retropie 2>/dev/null || echo "WARNING: nothing installed in /opt/retropie"

              echo "=== Packaging ==="
              if [ -d /opt/retropie ]; then
                tar -czf "/output/packages-'"${PACKAGE}"'-'"${DEBIAN}"'-armhf.tar.gz" -C / opt/retropie/
                echo "Package created:"
                ls -lh /output/*.tar.gz
              else
                echo "ERROR: /opt/retropie not found — build failed"
                exit 1
              fi

              echo "=== Done ==="
            ' 2>&1 | tee /tmp/output/run-${DEBIAN}.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.debian }}-${{ github.event.inputs.package || 'openbor' }}
          path: |
            /tmp/output/install-${{ matrix.debian }}.log
            /tmp/output/run-${{ matrix.debian }}.log

      - name: Upload package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ github.event.inputs.package || 'openbor' }}-${{ matrix.debian }}-armhf
          path: /tmp/output/packages-${{ github.event.inputs.package || 'openbor' }}-${{ matrix.debian }}-armhf.tar.gz
